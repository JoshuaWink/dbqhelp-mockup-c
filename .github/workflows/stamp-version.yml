name: Stamp Version
on:
  push:
    branches: [main]

jobs:
  stamp:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Write timestamp to version.txt
        run: date -u '+%Y.%m.%d.%H%M%S' > version.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git diff --cached --quiet || (git commit -m "chore: stamp version" && git push)
